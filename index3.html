<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Letter 💖 Amina</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle,#0b0b2a,#000);
    overflow:hidden;
    font-family:Poppins;
}

.envelope{
    font-size:120px;
    cursor:pointer;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-20px)}
}

.letter{
    display:none;
    width:90%;
    max-width:800px;
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 50px rgba(255,0,150,0.4);
    animation:open 1s ease;
    max-height:90vh;
    overflow-y:auto;
}

@keyframes open{
    from{transform:scale(0.6);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

h1{
    font-family:'Dancing Script';
    font-size:55px;
    color:#ff4d6d;
}

#text{
    font-size:20px;
    color:#333;
    line-height:1.8;
    margin-top:20px;
    min-height:200px;
    text-align:left;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px rgba(255,77,109,0.6);
    transition:0.3s;
}

button:hover{
    background:#ff85a2;
    transform:scale(1.05);
}

#fireworksCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:999;
}

@keyframes fly{
    to{
        transform:translate(var(--tx), var(--ty));
        opacity:0;
    }
}

@keyframes fall{
    0%{top:-10px; opacity:1;}
    100%{top:110vh; opacity:0;}
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">✉️</div>

<div class="letter" id="letter">
    <h1>Happy Birthday Amina 💖</h1>
    <div id="text"></div>
    <button onclick="surpriseEffect()">Click for Surprise 🎆</button>
</div>

<canvas id="fireworksCanvas"></canvas>

<script>

function openLetter(){
    document.querySelector(".envelope").style.display = "none";
    document.getElementById("letter").style.display = "block";
    typeText();
}

let msg = `Amina 💖

Aaj ka din sirf ek birthday nahi hai… yeh ek beautiful reminder hai ki tum kitni special ho ✨

Tum woh ho jo bina kuch bole bhi sabke chehre par smile la deti ho 🌸
Tumhari presence ek alag hi positivity create karti hai 💫

Main sach mein maanta hoon ki tum jaisi insaan milna bahut rare hota hai 🌟

Zindagi mein har din easy nahi hota, lekin main dua karta hoon:
Tum hamesha strong raho 💪
Hamesha khush raho 🌈
Aur hamesha shine karti raho ✨

🎂 Happy Birthday Amina 🎂
Tum special thi… ho… aur hamesha rahogi 💖
Aur yaad rakhna… tumhari value koi replace nahi kar sakta 💫`;

let idx = 0;

function typeText(){
    let box = document.getElementById("text");
    let interval = setInterval(()=>{
        box.innerHTML += msg[idx] === "\n" ? "<br>" : msg[idx];
        idx++;
        if(idx >= msg.length) clearInterval(interval);
    }, 35);
}

function surpriseEffect(){

    // FLASH
    let flash = document.createElement("div");
    flash.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:white;opacity:0.6;z-index:998;";
    document.body.appendChild(flash);
    setTimeout(()=> flash.remove(), 200);

    // BIG MESSAGE - SLOW ZOOM
    let popup = document.createElement("div");
    popup.innerHTML = "💖 HAPPY BIRTHDAY AMINA 💖";
    popup.style.cssText = `
        position:fixed;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%) scale(0);
        font-size:40px;
        font-weight:bold;
        color:#ff4d6d;
        z-index:1001;
        text-align:center;
        text-shadow:0 0 25px white, 0 0 50px pink;
        transition:1.5s ease;
        font-family:'Dancing Script',cursive;
    `;
    document.body.appendChild(popup);

    setTimeout(()=>{ popup.style.transform = "translate(-50%,-50%) scale(1.1)"; }, 100);
    setTimeout(()=>{ popup.style.transform = "translate(-50%,-50%) scale(1.3)"; }, 1800);
    setTimeout(()=>{ popup.style.transform = "translate(-50%,-50%) scale(0)"; }, 4000);
    setTimeout(()=> popup.remove(), 5500);

    // FIREWORKS
    for(let i = 0; i < 150; i++){
        let d = document.createElement("div");
        let angle = Math.random() * 360;
        let dist = Math.random() * 300 + 100;
        let tx = Math.cos(angle) * dist + "px";
        let ty = Math.sin(angle) * dist - 200 + "px";
        d.style.cssText = `
            position:fixed;
            width:7px;
            height:7px;
            border-radius:50%;
            left:50%;
            top:50%;
            background:${["#ff4d6d","#ffd166","#4cc9f0","#fff","#ff85a2"][Math.floor(Math.random()*5)]};
            animation:fly 2s ease forwards;
            --tx:${tx};
            --ty:${ty};
            z-index:1000;
        `;
        document.body.appendChild(d);
        setTimeout(()=> d.remove(), 2100);
    }

    // HEART RAIN
    for(let i = 0; i < 80; i++){
        let h = document.createElement("div");
        h.innerHTML = ["💖","🌸","✨","🎂","🎁"][Math.floor(Math.random()*5)];
        h.style.cssText = `
            position:fixed;
            left:${Math.random()*100}vw;
            top:-10px;
            font-size:${Math.random()*20+15}px;
            animation:fall ${Math.random()*2+2}s linear forwards;
            z-index:1000;
        `;
        document.body.appendChild(h);
        setTimeout(()=> h.remove(), 4000);
    }
}

</script>
</body>
</html>
